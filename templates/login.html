<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{SITE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#111510; --paper:#f4f5ee; --panel:#fbfcf4; --lime:#d7ff35; --line:#1f261c; --muted:#5c6658; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--ink);
      background: linear-gradient(135deg, #f7f8f1, #e8eddf);
      font-family: "DM Mono", monospace;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .12;
      background-image: radial-gradient(var(--ink) 1px, transparent 1px);
      background-size: 9px 9px;
    }
    .login {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(251, 252, 244, .94);
      box-shadow: 0 18px 48px rgba(17, 21, 16, .14);
      padding: 22px;
      position: relative;
    }
    h1 {
      margin: 0 0 8px;
      font: 800 clamp(1.6rem, 7vw, 2.4rem)/1.05 "Syne", sans-serif;
      overflow-wrap: anywhere;
    }
    p { color: var(--muted); line-height: 1.5; margin: 0 0 18px; }
    label { display: grid; gap: 7px; color: var(--muted); text-transform: uppercase; font-size: .78rem; }
    input, button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      color: var(--ink);
    }
    input { padding: 0 12px; background: var(--paper); margin-bottom: 12px; }
    button { background: var(--lime); box-shadow: 3px 3px 0 var(--line); cursor: pointer; font-weight: 700; }
    .error { min-height: 22px; margin-top: 12px; color: #b43224; }
  </style>
</head>
<body>
  <form class="login" id="loginForm">
    <h1>{{SITE_TITLE}}</h1>
    <p>Password required before routes are exposed.</p>
    <label>Password<input id="password" type="password" autocomplete="current-password" autofocus /></label>
    <button type="submit">Unlock</button>
    <div class="error" id="error"></div>
  </form>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: document.getElementById("password").value })
      });
      if (res.ok) {
        location.reload();
      } else {
        error.textContent = "Wrong password.";
      }
    });
  </script>
</body>
</html>
